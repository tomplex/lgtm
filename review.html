<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Review</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --add-bg: #12261e;
    --add-text: #3fb950;
    --add-line-bg: #0d2818;
    --del-bg: #2d1215;
    --del-text: #f85149;
    --del-line-bg: #2a1113;
    --hunk-bg: #1b2536;
    --hunk-text: #79c0ff;
    --comment-bg: #1a1f2b;
    --comment-border: #58a6ff;
    --hover: #1f2937;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 16px;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }

  header .stats {
    font-size: 13px;
    color: var(--text-muted);
    flex: 1;
  }

  .stats .add { color: var(--add-text); }
  .stats .del { color: var(--del-text); }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .header-btn {
    padding: 8px 16px;
    background: var(--bg-tertiary);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .header-btn:hover { background: var(--hover); border-color: var(--accent); }

  #submit-btn {
    padding: 8px 20px;
    background: #238636;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  #submit-btn:hover { background: #2ea043; }
  #submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    width: 280px;
    min-width: 150px;
    max-width: 600px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

  .resize-handle {
    width: 4px;
    cursor: col-resize;
    background: transparent;
    flex-shrink: 0;
    transition: background 0.15s;
    position: relative;
  }
  .resize-handle:hover,
  .resize-handle.dragging {
    background: var(--accent);
  }

  .sidebar-search {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-search input {
    width: 100%;
    padding: 6px 10px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 12px;
    outline: none;
    font-family: inherit;
  }
  .sidebar-search input:focus { border-color: var(--accent); }
  .sidebar-search input::placeholder { color: var(--text-muted); }

  .file-list {
    overflow-y: auto;
    flex: 1;
  }

  .file-item {
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.1s;
  }
  .file-item:hover { background: var(--hover); }
  .file-item.active { background: var(--bg-tertiary); border-left: 2px solid var(--accent); }
  .file-item.hidden { display: none; }

  .file-item .filename {
    flex: 1;
    overflow: hidden;
    font-family: 'SF Mono', 'Fira Code', monospace;
    min-width: 0;
  }
  .file-item .filename .dir {
    font-size: 10px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: block;
    line-height: 1.4;
  }
  .file-item .filename .base {
    font-size: 12px;
    font-weight: 500;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.4;
  }

  .file-item .badge {
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .badge.comments-badge {
    background: var(--accent);
    color: var(--bg);
  }
  .badge.claude-badge {
    background: #6e40c9;
    color: white;
  }

  .file-item .file-stats {
    font-size: 11px;
    flex-shrink: 0;
  }
  .file-item .file-stats .add { color: var(--add-text); }
  .file-item .file-stats .del { color: var(--del-text); }

  .diff-container {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  .diff-file-header {
    padding: 12px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    font-weight: 600;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  table.diff-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 20px;
  }

  .diff-table td {
    padding: 0 12px;
    white-space: pre;
    vertical-align: top;
  }

  .diff-table .line-num {
    width: 50px;
    min-width: 50px;
    text-align: right;
    color: var(--text-muted);
    user-select: none;
    cursor: pointer;
    padding-right: 8px;
    opacity: 0.6;
  }
  .diff-table .line-num:hover {
    opacity: 1;
    color: var(--accent);
  }

  .diff-table .line-content {
    width: 100%;
  }

  /* Syntax highlighting overrides for diff lines */
  .diff-table .line-content code {
    background: none !important;
    padding: 0 !important;
    font-family: inherit;
    font-size: inherit;
  }

  tr.diff-add { background: var(--add-line-bg); }
  tr.diff-del { background: var(--del-line-bg); }

  tr.diff-hunk { background: var(--hunk-bg); }
  tr.diff-hunk .line-content {
    color: var(--hunk-text);
    font-style: italic;
    padding: 4px 12px;
  }

  /* +/- prefix gets diff color, code gets syntax colors */
  .diff-prefix {
    user-select: none;
  }
  tr.diff-add .diff-prefix { color: var(--add-text); }
  tr.diff-del .diff-prefix { color: var(--del-text); }
  tr.diff-context .diff-prefix { color: var(--text-muted); }

  /* Syntax highlighted code: always use syntax colors */
  .diff-table .line-content code { color: var(--text); }

  /* Non-highlighted fallback for context lines */
  tr.diff-context .line-content .diff-text:not(code) { color: var(--text-muted); }

  /* Comment rows */
  tr.comment-row td {
    padding: 8px 12px 8px 60px;
    background: var(--comment-bg);
    border-left: 3px solid var(--comment-border);
    white-space: normal;
    max-width: 0;
  }

  .comment-box {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-width: calc(100vw - 360px);
  }

  .comment-box textarea {
    width: 100%;
    min-height: 60px;
    padding: 8px 12px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 13px;
    resize: vertical;
    outline: none;
  }
  .comment-box textarea:focus { border-color: var(--accent); }

  .comment-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .comment-actions button {
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    color: var(--text);
  }
  .comment-actions .save-btn {
    background: #238636;
    border-color: #238636;
    color: white;
  }
  .comment-actions .save-btn:hover { background: #2ea043; }
  .comment-actions .cancel-btn:hover { background: var(--hover); }

  .saved-comment {
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
    cursor: pointer;
    position: relative;
  }
  .saved-comment:hover { border-color: var(--accent); }
  .saved-comment .edit-hint {
    position: absolute;
    top: 4px;
    right: 8px;
    font-size: 10px;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .saved-comment:hover .edit-hint { opacity: 1; }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-size: 14px;
  }

  .toast {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 12px 20px;
    background: #238636;
    color: white;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    z-index: 200;
    opacity: 0;
    transform: translateY(-10px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .keyboard-hint {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--text-muted);
    z-index: 50;
  }
  kbd {
    padding: 2px 6px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 11px;
    font-family: 'SF Mono', monospace;
  }

  /* --- Commit picker --- */
  .commit-toggle {
    position: relative;
  }
  .commit-toggle .badge-count {
    font-size: 10px;
    background: var(--accent);
    color: var(--bg);
    padding: 1px 5px;
    border-radius: 8px;
    margin-left: 4px;
    font-weight: 600;
  }

  .commit-panel {
    display: none;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-direction: column;
  }
  .commit-panel.open { display: flex; }

  .commit-list {
    max-height: 200px;
    overflow-y: auto;
  }

  .commit-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 20px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  .commit-item:hover { background: var(--hover); }
  .commit-item:last-child { border-bottom: none; }

  .commit-item input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px;
    height: 14px;
    cursor: pointer;
  }

  .commit-sha {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
    color: var(--accent);
    flex-shrink: 0;
  }

  .commit-msg {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }

  .commit-date {
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .commit-actions {
    display: flex;
    gap: 12px;
    padding: 6px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-tertiary);
    font-size: 12px;
    flex-shrink: 0;
  }
  .commit-actions a {
    color: var(--accent);
    cursor: pointer;
    text-decoration: none;
  }
  .commit-actions a:hover { text-decoration: underline; }

  /* --- Tab bar --- */
  .tab-bar {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    flex-shrink: 0;
    overflow-x: auto;
  }

  .tab-item {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab-item:hover { color: var(--text); }
  .tab-item.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  .tab-item .tab-badge {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 8px;
    font-weight: 600;
  }
  .tab-item .tab-badge.user { background: var(--accent); color: var(--bg); }
  .tab-item .tab-badge.claude { background: #6e40c9; color: white; }

  /* --- Meta bar --- */
  .meta-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 6px 20px;
    background: var(--bg-tertiary);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
  }
  .meta-bar .branch {
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--accent);
  }
  .meta-bar .pr-link {
    color: var(--accent);
    text-decoration: none;
  }
  .meta-bar .pr-link:hover { text-decoration: underline; }

  /* --- Description banner --- */
  .description-banner {
    padding: 10px 20px;
    background: var(--hunk-bg);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--hunk-text);
    line-height: 1.5;
  }

  /* --- Claude comments --- */
  .claude-comment {
    padding: 8px 12px;
    background: #1a1528;
    border: 1px solid #6e40c9;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
    position: relative;
  }
  .claude-comment .claude-label {
    font-size: 10px;
    font-weight: 600;
    color: #a371f7;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    display: block;
  }
  tr.claude-comment-row td {
    padding: 8px 12px 8px 60px;
    background: #1a1528;
    border-left: 3px solid #6e40c9;
    white-space: normal;
    max-width: 0;
  }

  /* --- Reviewed file marker --- */
  .file-item.reviewed { opacity: 0.45; }
  .file-item.reviewed .filename .base { text-decoration: line-through; }
  .review-check {
    font-size: 14px;
    flex-shrink: 0;
    cursor: pointer;
    opacity: 0.3;
    transition: opacity 0.15s;
  }
  .review-check:hover { opacity: 0.7; }
  .file-item.reviewed .review-check { opacity: 1; color: var(--add-text); }

  /* --- Expand context --- */
  tr.expand-row td {
    text-align: center;
    padding: 4px 12px;
    cursor: pointer;
    color: var(--accent);
    font-size: 11px;
    background: var(--bg-tertiary);
    user-select: none;
  }
  tr.expand-row:hover td { background: var(--hover); }

  /* --- Word-level diff --- */
  .wdiff-add {
    background: rgba(63, 185, 80, 0.25);
    border-radius: 2px;
    padding: 0 1px;
  }
  .wdiff-del {
    background: rgba(248, 81, 73, 0.25);
    border-radius: 2px;
    padding: 0 1px;
  }

  /* --- Markdown mode --- */
  .md-container {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  .md-content {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 48px 80px;
    line-height: 1.7;
    font-size: 15px;
  }

  .md-content h1, .md-content h2, .md-content h3,
  .md-content h4, .md-content h5, .md-content h6 {
    color: var(--text);
    margin: 1.5em 0 0.5em;
    font-weight: 600;
    line-height: 1.3;
    border-bottom: none;
  }
  .md-content h1 { font-size: 28px; margin-top: 0; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .md-content h2 { font-size: 22px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .md-content h3 { font-size: 18px; }

  .md-content p, .md-content li { color: var(--text); }
  .md-content a { color: var(--accent); text-decoration: none; }
  .md-content a:hover { text-decoration: underline; }

  .md-content code {
    background: var(--bg-tertiary);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
  }

  .md-content pre {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    margin: 1em 0;
  }
  .md-content pre code {
    background: none;
    padding: 0;
    font-size: 13px;
    line-height: 1.5;
  }

  .md-content blockquote {
    border-left: 3px solid var(--accent);
    margin: 1em 0;
    padding: 4px 16px;
    color: var(--text-muted);
  }

  .md-content table {
    border-collapse: collapse;
    width: 100%;
    margin: 1em 0;
  }
  .md-content th, .md-content td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }
  .md-content th { background: var(--bg-secondary); font-weight: 600; }

  .md-content ul, .md-content ol { padding-left: 24px; margin: 0.5em 0; }
  .md-content li { margin: 0.25em 0; }

  .md-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2em 0;
  }

  /* Commentable blocks */
  .md-block {
    position: relative;
    border-radius: 6px;
    padding: 2px 8px;
    margin: 0 -8px;
    transition: background 0.1s;
    cursor: pointer;
  }
  .md-block:hover {
    background: var(--hover);
  }
  .md-block.has-comment {
    border-left: 3px solid var(--comment-border);
    padding-left: 12px;
  }

  .md-comment {
    margin: 8px 0 16px;
    padding-left: 8px;
  }
</style>
</head>
<body>
<header>
  <h1>Code Review</h1>
  <div class="stats" id="stats"></div>
  <div class="header-actions">
    <div class="commit-toggle" id="commit-toggle-wrap" style="display:none">
      <button class="header-btn" id="commit-toggle-btn" onclick="toggleCommitPanel()">Commits</button>
    </div>
    <button class="header-btn" onclick="refreshDiff()">Refresh</button>
    <button id="submit-btn" onclick="submitReview()">Submit Review</button>
  </div>
</header>
<div class="tab-bar" id="tab-bar"></div>
<div class="meta-bar" id="meta-bar" style="display:none"></div>
<div class="commit-panel" id="commit-panel"></div>
<div class="description-banner" id="description-banner" style="display:none"></div>
<div class="main">
  <div class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="file-search" placeholder="Filter files... (f)" autocomplete="off">
    </div>
    <div class="file-list" id="file-list"></div>
  </div>
  <div class="resize-handle" id="resize-handle"></div>
  <div class="diff-container" id="diff-container">
    <div class="empty-state">Loading diff...</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="keyboard-hint">
  Click line to comment &middot; <kbd>Cmd+Enter</kbd> save &middot; <kbd>f</kbd> search &middot; <kbd>e</kbd> reviewed &middot; <kbd>c</kbd> commits &middot; <kbd>n</kbd>/<kbd>p</kbd> next/prev comment
</div>

<script>
let files = [];
const comments = {};
let activeFileIdx = 0;

// --- Language detection ---
const EXT_TO_LANG = {
  js: 'javascript', jsx: 'javascript', ts: 'typescript', tsx: 'typescript',
  py: 'python', rb: 'ruby', go: 'go', rs: 'rust', java: 'java',
  kt: 'kotlin', cs: 'csharp', cpp: 'cpp', c: 'c', h: 'c', hpp: 'cpp',
  swift: 'swift', php: 'php', sh: 'bash', bash: 'bash', zsh: 'bash',
  sql: 'sql', html: 'xml', htm: 'xml', xml: 'xml', svg: 'xml',
  css: 'css', scss: 'scss', less: 'less', json: 'json', yaml: 'yaml',
  yml: 'yaml', toml: 'ini', md: 'markdown', ex: 'elixir', exs: 'elixir',
  erl: 'erlang', hs: 'haskell', lua: 'lua', r: 'r', R: 'r',
  pl: 'perl', pm: 'perl', scala: 'scala', tf: 'hcl', vim: 'vim',
  dockerfile: 'dockerfile', makefile: 'makefile',
};

function detectLang(path) {
  const basename = path.split('/').pop().toLowerCase();
  if (basename === 'dockerfile') return 'dockerfile';
  if (basename === 'makefile' || basename === 'gnumakefile') return 'makefile';
  if (basename === 'gemfile' || basename === 'rakefile' || basename.endsWith('.gemspec')) return 'ruby';
  const ext = basename.split('.').pop();
  return EXT_TO_LANG[ext] || null;
}

function highlightLine(code, lang) {
  if (!lang || !hljs.getLanguage(lang)) return escapeHtml(code);
  try {
    return hljs.highlight(code, { language: lang, ignoreIllegals: true }).value;
  } catch {
    return escapeHtml(code);
  }
}

// --- Data fetching ---
let appMode = 'diff';
let mdMeta = {};
let repoMeta = {};
let claudeComments = [];
let sessionItems = [];
let activeItemId = 'diff';

async function fetchData() {

// --- Diff parser ---
function parseDiff(raw) {
  const result = [];
  const lines = raw.split('\n');
  let current = null;
  let oldLine = 0, newLine = 0;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (line.startsWith('diff --git')) {
      current = { path: '', additions: 0, deletions: 0, lines: [] };
      result.push(current);
      continue;
    }
    if (!current) continue;
    if (line.startsWith('--- a/') || line.startsWith('--- /dev/null')) continue;
    if (line.startsWith('+++ b/')) { current.path = line.slice(6); continue; }
    if (line.startsWith('+++ /dev/null')) {
      if (i > 0 && lines[i-1].startsWith('--- a/')) current.path = lines[i-1].slice(6) + ' (deleted)';
      continue;
    }
    if (line.startsWith('@@')) {
      const match = line.match(/@@ -(\d+)(?:,\d+)? \+(\d+)(?:,\d+)? @@(.*)/);
      if (match) {
        oldLine = parseInt(match[1]);
        newLine = parseInt(match[2]);
        current.lines.push({ type: 'hunk', content: line, oldLine: null, newLine: null });
      }
      continue;
    }
    if (/^(index |Binary |new file|deleted file|old mode|new mode|similarity|rename|copy )/.test(line)) continue;

    if (line.startsWith('+')) {
      current.additions++;
      current.lines.push({ type: 'add', content: line.slice(1), oldLine: null, newLine: newLine++ });
    } else if (line.startsWith('-')) {
      current.deletions++;
      current.lines.push({ type: 'del', content: line.slice(1), oldLine: oldLine++, newLine: null });
    } else if (line.startsWith(' ') || line === '') {
      current.lines.push({ type: 'context', content: line.slice(1) || '', oldLine: oldLine++, newLine: newLine++ });
    }
  }
  return result.filter(f => f.path);
}

// --- Line ID management ---
let lineIdCounter = 0;
const lineKeyToId = {};

function getLineId(lineKey) {
  if (!lineKeyToId[lineKey]) lineKeyToId[lineKey] = 'lc-' + (lineIdCounter++);
  return lineKeyToId[lineKey];
}

function lineIdToKey(lineId) {
  for (const [key, id] of Object.entries(lineKeyToId)) {
    if (id === lineId) return key;
  }
  return null;
}

// --- Reviewed files ---
const reviewedFiles = new Set();

function toggleReviewed(path, e) {
  if (e) e.stopPropagation();
  if (reviewedFiles.has(path)) reviewedFiles.delete(path);
  else reviewedFiles.add(path);
  renderFileList();
}

// --- Word-level diff ---
function computeWordDiff(oldStr, newStr) {
  // Split into words preserving whitespace
  const oldWords = oldStr.match(/\S+|\s+/g) || [];
  const newWords = newStr.match(/\S+|\s+/g) || [];

  // Simple LCS-based diff
  const m = oldWords.length, n = newWords.length;
  const dp = Array.from({length: m + 1}, () => new Array(n + 1).fill(0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = oldWords[i-1] === newWords[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);

  // Backtrack
  const result = { old: [], new: [] };
  let i = m, j = n;
  const oldParts = [], newParts = [];
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && oldWords[i-1] === newWords[j-1]) {
      oldParts.unshift({ text: oldWords[i-1], changed: false });
      newParts.unshift({ text: newWords[j-1], changed: false });
      i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      newParts.unshift({ text: newWords[j-1], changed: true });
      j--;
    } else {
      oldParts.unshift({ text: oldWords[i-1], changed: true });
      i--;
    }
  }
  return { oldParts, newParts };
}

function renderWordDiff(parts, cls) {
  return parts.map(p => p.changed ? `<span class="${cls}">${escapeHtml(p.text)}</span>` : escapeHtml(p.text)).join('');
}

// --- File search ---
function filterFiles(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.file-item').forEach(el => {
    const path = el.querySelector('.filename').textContent.toLowerCase();
    el.classList.toggle('hidden', q && !path.includes(q));
  });
}

// --- Render sidebar ---
function renderFileList() {
  const el = document.getElementById('file-list');
  el.innerHTML = '';
  let totalAdd = 0, totalDel = 0;

  files.forEach((file, idx) => {
    totalAdd += file.additions;
    totalDel += file.deletions;

    const div = document.createElement('div');
    const isReviewed = reviewedFiles.has(file.path);
    div.className = 'file-item' + (idx === activeFileIdx ? ' active' : '') + (isReviewed ? ' reviewed' : '');
    div.dataset.idx = idx;

    const commentCount = Object.keys(comments).filter(k => k.startsWith(file.path + '::')).length;
    const claudeCount = claudeComments.filter(c => c.file === file.path).length;

    const lastSlash = file.path.lastIndexOf('/');
    const dir = lastSlash >= 0 ? file.path.slice(0, lastSlash + 1) : '';
    const base = lastSlash >= 0 ? file.path.slice(lastSlash + 1) : file.path;

    div.innerHTML = `
      <span class="review-check" title="Mark as reviewed (e)">${isReviewed ? '&#10003;' : '&#9675;'}</span>
      <span class="filename" title="${escapeHtml(file.path)}">
        ${dir ? `<span class="dir">${escapeHtml(dir)}</span>` : ''}
        <span class="base">${escapeHtml(base)}</span>
      </span>
      ${claudeCount > 0 ? `<span class="badge claude-badge" title="Claude comments">${claudeCount}</span>` : ''}
      ${commentCount > 0 ? `<span class="badge comments-badge" title="Your comments">${commentCount}</span>` : ''}
      <span class="file-stats">
        <span class="add">+${file.additions}</span>
        <span class="del">-${file.deletions}</span>
      </span>
    `;
    div.querySelector('.review-check').addEventListener('click', (ev) => toggleReviewed(file.path, ev));
    div.onclick = () => selectFile(idx);
    el.appendChild(div);
  });

  document.getElementById('stats').innerHTML = `
    ${files.length} file${files.length !== 1 ? 's' : ''} &middot;
    <span class="add">+${totalAdd}</span> <span class="del">-${totalDel}</span>
    ${Object.keys(comments).length > 0 ? ` &middot; ${Object.keys(comments).length} comment${Object.keys(comments).length !== 1 ? 's' : ''}` : ''}
  `;

  // Re-apply search filter
  const q = document.getElementById('file-search').value;
  if (q) filterFiles(q);
}

// --- Render diff ---
function renderDiff(fileIdx) {
  const file = files[fileIdx];
  if (!file) return;
  const container = document.getElementById('diff-container');
  const lang = detectLang(file.path);

  let html = `<div class="diff-file-header">${escapeHtml(file.path)} <a style="float:right;font-size:11px;font-weight:400;color:var(--accent);cursor:pointer;text-decoration:none" onclick="showWholeFile(${fileIdx})">Show whole file</a></div>`;
  html += `<table class="diff-table">`;

  // Pre-compute word diffs for adjacent del/add pairs
  const wordDiffs = {};
  for (let i = 0; i < file.lines.length - 1; i++) {
    if (file.lines[i].type === 'del' && file.lines[i+1].type === 'add') {
      const wd = computeWordDiff(file.lines[i].content, file.lines[i+1].content);
      wordDiffs[i] = wd.oldParts;
      wordDiffs[i+1] = wd.newParts;
    }
  }

  file.lines.forEach((line, lineIdx) => {
    const lineKey = `${file.path}::${lineIdx}`;
    const lineId = getLineId(lineKey);

    if (line.type === 'hunk') {
      const hunkMatch = line.content.match(/@@ -(\d+)(?:,\d+)? \+(\d+)/);
      const hunkNewStart = hunkMatch ? parseInt(hunkMatch[2]) : 0;

      // Find the previous line's number to measure the gap
      let prevNewLine = 0;
      for (let pi = lineIdx - 1; pi >= 0; pi--) {
        if (file.lines[pi].newLine != null) { prevNewLine = file.lines[pi].newLine; break; }
      }
      const gap = hunkNewStart - prevNewLine - 1;
      const isSmallGap = prevNewLine > 0 && gap > 0 && gap <= 8;

      if (isSmallGap) {
        // Auto-fill small gaps with a placeholder that loads on render
        html += `<tr class="expand-row" data-auto-expand data-file="${escapeHtml(file.path)}" data-line="${prevNewLine}" data-count="${gap}">
          <td colspan="3" style="color:var(--text-muted)">&#8943; ${gap} line${gap !== 1 ? 's' : ''} hidden</td>
        </tr>`;
      } else if (hunkNewStart > 1) {
        html += `<tr class="expand-row" onclick="expandContext('${escapeHtml(file.path)}', ${hunkNewStart}, 'up', this)">
          <td colspan="3">&#8943; Show more context above</td>
        </tr>`;
      }
      html += `<tr class="diff-hunk">
        <td class="line-num"></td><td class="line-num"></td>
        <td class="line-content">${escapeHtml(line.content)}</td>
      </tr>`;
    } else {
      const cls = line.type === 'add' ? 'diff-add' : line.type === 'del' ? 'diff-del' : 'diff-context';
      const prefix = line.type === 'add' ? '+' : line.type === 'del' ? '-' : ' ';

      let codeHtml;
      if (wordDiffs[lineIdx]) {
        const wdCls = line.type === 'del' ? 'wdiff-del' : 'wdiff-add';
        codeHtml = `<code>${renderWordDiff(wordDiffs[lineIdx], wdCls)}</code>`;
      } else if (lang) {
        codeHtml = `<code>${highlightLine(line.content, lang)}</code>`;
      } else {
        codeHtml = `<span class="diff-text">${escapeHtml(line.content)}</span>`;
      }

      html += `<tr class="${cls}" id="line-${lineId}">
        <td class="line-num" onclick="toggleComment('${lineId}')">${line.oldLine ?? ''}</td>
        <td class="line-num" onclick="toggleComment('${lineId}')">${line.newLine ?? ''}</td>
        <td class="line-content"><span class="diff-prefix">${prefix}</span>${codeHtml}</td>
      </tr>`;
    }

    // Claude's comments on this line
    const lineNum = line.newLine ?? line.oldLine;
    const claudeForLine = claudeComments.filter(c => c.file === file.path && c.line === lineNum);
    for (const cc of claudeForLine) {
      html += `<tr class="claude-comment-row">
        <td colspan="3">
          <div class="comment-box" style="max-width:calc(100vw - 360px)">
            <div class="claude-comment">
              <span class="claude-label">Claude</span>
              ${escapeHtml(cc.comment)}
            </div>
          </div>
        </td>
      </tr>`;
    }

    if (comments[lineKey]) {
      html += `<tr class="comment-row" id="cr-${lineId}">
        <td colspan="3">
          <div class="comment-box">
            <div class="saved-comment" onclick="editComment('${lineId}')">
              ${escapeHtml(comments[lineKey])}
              <span class="edit-hint">click to edit</span>
            </div>
          </div>
        </td>
      </tr>`;
    }
  });

  // Expand context at end of file
  const lastLine = file.lines[file.lines.length - 1];
  if (lastLine && lastLine.newLine) {
    html += `<tr class="expand-row" onclick="expandContext('${escapeHtml(file.path)}', ${lastLine.newLine}, 'down', this)">
      <td colspan="3">&#8943; Show more context below</td>
    </tr>`;
  }

  html += `</table>`;
  container.innerHTML = html;

  // Auto-expand small gaps and remove their hunk headers
  container.querySelectorAll('tr[data-auto-expand]').forEach(row => {
    const count = parseInt(row.dataset.count) || 8;
    // Remove the hunk header row immediately after this expand row
    const next = row.nextElementSibling;
    if (next && next.classList.contains('diff-hunk')) next.remove();
    expandContext(row.dataset.file, parseInt(row.dataset.line), 'down', row, count);
  });

  // Handle hash-based navigation
  const hash = window.location.hash;
  if (hash) applyHash(hash);
}

async function expandContext(filepath, lineNum, direction, rowEl, count = 20) {
  try {
    const resp = await fetch(`/context?file=${encodeURIComponent(filepath)}&line=${lineNum}&count=${count}&direction=${direction}`);
    const data = await resp.json();
    if (!data.lines || data.lines.length === 0) {
      rowEl.remove();
      return;
    }
    const lang = detectLang(filepath);
    let html = '';
    for (const l of data.lines) {
      const highlighted = lang ? `<code>${highlightLine(l.content, lang)}</code>` : `<span class="diff-text">${escapeHtml(l.content)}</span>`;
      html += `<tr class="diff-context">
        <td class="line-num">${l.num}</td>
        <td class="line-num">${l.num}</td>
        <td class="line-content"><span class="diff-prefix"> </span>${highlighted}</td>
      </tr>`;
    }
    const temp = document.createElement('tbody');
    temp.innerHTML = html;
    const rows = Array.from(temp.children);
    if (direction === 'up') {
      for (const row of rows) rowEl.before(row);
    } else {
      let after = rowEl;
      for (const row of rows) { after.after(row); after = row; }
    }
    rowEl.remove();
  } catch {}
}

async function showWholeFile(fileIdx) {
  const file = files[fileIdx];
  if (!file) return;
  try {
    const resp = await fetch(`/file?path=${encodeURIComponent(file.path)}`);
    const data = await resp.json();
    if (!data.lines || data.lines.length === 0) return;

    const lang = detectLang(file.path);
    const container = document.getElementById('diff-container');

    // Build a set of changed line numbers for highlighting
    const addLines = new Set();
    const delLines = new Set();
    file.lines.forEach(l => {
      if (l.type === 'add' && l.newLine) addLines.add(l.newLine);
      if (l.type === 'del' && l.oldLine) delLines.add(l.oldLine);
    });

    let html = `<div class="diff-file-header">${escapeHtml(file.path)} <a style="float:right;font-size:11px;font-weight:400;color:var(--accent);cursor:pointer" onclick="renderDiff(${fileIdx})">Back to diff</a></div>`;
    html += `<table class="diff-table">`;
    for (const l of data.lines) {
      const cls = addLines.has(l.num) ? 'diff-add' : '';
      const codeHtml = lang ? `<code>${highlightLine(l.content, lang)}</code>` : `<span class="diff-text">${escapeHtml(l.content)}</span>`;
      html += `<tr class="${cls}">
        <td class="line-num">${l.num}</td>
        <td class="line-num">${l.num}</td>
        <td class="line-content"><span class="diff-prefix"> </span>${codeHtml}</td>
      </tr>`;
    }
    html += `</table>`;
    container.innerHTML = html;
  } catch (e) {
    showToast('Failed to load file: ' + e.message);
  }
}

function selectFile(idx) {
  activeFileIdx = idx;
  document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.file-item[data-idx="${idx}"]`)?.classList.add('active');
  // Update URL hash
  if (files[idx]) window.location.hash = 'file=' + encodeURIComponent(files[idx].path);
  renderDiff(idx);
}

function applyHash(hash) {
  const match = hash.match(/#file=(.+)/);
  if (!match) return;
  const path = decodeURIComponent(match[1]);
  const idx = files.findIndex(f => f.path === path);
  if (idx >= 0 && idx !== activeFileIdx) selectFile(idx);
}

window.addEventListener('hashchange', () => applyHash(window.location.hash));

// --- Comments ---
function toggleComment(lineId) {
  const lineKey = lineIdToKey(lineId);
  if (!lineKey) return;
  if (comments[lineKey]) { editComment(lineId); return; }
  const existing = document.getElementById('cr-' + lineId);
  if (existing) { existing.querySelector('textarea')?.focus(); return; }

  const lineRow = document.getElementById('line-' + lineId);
  if (!lineRow) return;

  const commentRow = document.createElement('tr');
  commentRow.className = 'comment-row';
  commentRow.id = 'cr-' + lineId;
  commentRow.innerHTML = `
    <td colspan="3">
      <div class="comment-box">
        <textarea placeholder="Leave a comment..." autofocus></textarea>
        <div class="comment-actions">
          <button class="cancel-btn" data-action="cancel">Cancel</button>
          <button class="save-btn" data-action="save">Save</button>
        </div>
      </div>
    </td>
  `;

  const textarea = commentRow.querySelector('textarea');
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { cancelComment(lineId); e.preventDefault(); }
    else if (e.key === 'Enter' && e.metaKey) { saveComment(lineId); e.preventDefault(); }
  });
  commentRow.querySelector('[data-action="cancel"]').addEventListener('click', () => cancelComment(lineId));
  commentRow.querySelector('[data-action="save"]').addEventListener('click', () => saveComment(lineId));

  lineRow.after(commentRow);
  textarea.focus();
}

function editComment(lineId) {
  const row = document.getElementById('cr-' + lineId);
  if (!row) return;
  const lineKey = lineIdToKey(lineId);
  if (!lineKey) return;

  const currentText = comments[lineKey];
  const td = row.querySelector('td');
  td.innerHTML = `
    <div class="comment-box">
      <textarea>${escapeHtml(currentText)}</textarea>
      <div class="comment-actions">
        <button class="cancel-btn" data-action="cancel-edit">Cancel</button>
        <button class="cancel-btn" data-action="delete" style="color: var(--del-text)">Delete</button>
        <button class="save-btn" data-action="save">Save</button>
      </div>
    </div>
  `;

  const textarea = td.querySelector('textarea');
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { renderDiff(activeFileIdx); e.preventDefault(); }
    else if (e.key === 'Enter' && e.metaKey) { saveComment(lineId); e.preventDefault(); }
  });
  td.querySelector('[data-action="cancel-edit"]').addEventListener('click', () => renderDiff(activeFileIdx));
  td.querySelector('[data-action="delete"]').addEventListener('click', () => deleteComment(lineId));
  td.querySelector('[data-action="save"]').addEventListener('click', () => saveComment(lineId));

  textarea.focus();
  textarea.setSelectionRange(textarea.value.length, textarea.value.length);
}

function saveComment(lineId) {
  const row = document.getElementById('cr-' + lineId);
  if (!row) return;
  const lineKey = lineIdToKey(lineId);
  if (!lineKey) return;
  const text = row.querySelector('textarea')?.value?.trim();
  if (!text) { deleteComment(lineId); return; }
  comments[lineKey] = text;
  renderDiff(activeFileIdx);
  renderFileList();
}

function cancelComment(lineId) {
  const lineKey = lineIdToKey(lineId);
  if (lineKey && !comments[lineKey]) document.getElementById('cr-' + lineId)?.remove();
}

function deleteComment(lineId) {
  const lineKey = lineIdToKey(lineId);
  if (lineKey) delete comments[lineKey];
  renderDiff(activeFileIdx);
  renderFileList();
}

// --- Comment navigation ---
function jumpToComment(direction) {
  const container = document.getElementById('diff-container');
  const rows = Array.from(container.querySelectorAll('tr.comment-row, tr.claude-comment-row'));
  if (rows.length === 0) return;

  const scrollTop = container.scrollTop;
  const containerRect = container.getBoundingClientRect();

  if (direction === 'next') {
    const next = rows.find(r => r.getBoundingClientRect().top > containerRect.top + 10);
    if (next) next.scrollIntoView({ block: 'center', behavior: 'smooth' });
    else rows[0].scrollIntoView({ block: 'center', behavior: 'smooth' }); // wrap
  } else {
    const prev = rows.reverse().find(r => r.getBoundingClientRect().top < containerRect.top - 10);
    if (prev) prev.scrollIntoView({ block: 'center', behavior: 'smooth' });
    else rows[0].scrollIntoView({ block: 'center', behavior: 'smooth' }); // wrap
  }
}

// --- Utilities ---
function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// --- Actions ---
async function refreshDiff() {
  try {
    // Reload items in case new docs were added
    await loadItems();
    // Re-switch to current item (reloads data)
    await switchToItem(activeItemId);
    showToast('Refreshed');
  } catch (e) {
    showToast('Failed to refresh: ' + e.message);
  }
}

async function submitReview() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    const formatted = formatAllComments();
    const resp = await fetch('/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ comments: formatted, raw: comments })
    });
    if (resp.ok) {
      const data = await resp.json();
      showToast(`Review round ${data.round} submitted!`, 3000);
      for (const key of Object.keys(comments)) delete comments[key];
      if (appMode === 'file') {
        renderMarkdownComments();
      } else {
        renderFileList();
        renderDiff(activeFileIdx);
      }
    }
  } catch (e) {
    showToast('Failed to submit: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit Review';
  }
}

function formatDiffComments() {
  const byFile = {};
  for (const [key, text] of Object.entries(comments)) {
    // Skip document comments (they're handled by formatAllComments)
    if (key.startsWith('doc:') || key.startsWith('md::')) continue;
    const sepIdx = key.lastIndexOf('::');
    const filePath = key.substring(0, sepIdx);
    const lineIdxStr = key.substring(sepIdx + 2);
    if (!byFile[filePath]) byFile[filePath] = [];
    const lineIdx = parseInt(lineIdxStr);
    const file = files.find(f => f.path === filePath);
    const line = file?.lines[lineIdx];
    byFile[filePath].push({
      lineNum: line?.newLine ?? line?.oldLine ?? '?',
      lineType: line?.type ?? 'context',
      lineContent: line?.content ?? '',
      comment: text
    });
  }
  let output = '';
  for (const [filePath, fileComments] of Object.entries(byFile)) {
    output += `## ${filePath}\n\n`;
    for (const c of fileComments.sort((a, b) => a.lineNum - b.lineNum)) {
      const prefix = c.lineType === 'add' ? '+' : c.lineType === 'del' ? '-' : ' ';
      output += `Line ${c.lineNum}: \`${prefix}${c.lineContent.trim()}\`\n`;
      output += `> ${c.comment}\n\n`;
    }
  }
  return output || 'No comments (LGTM).';
}

function formatAllComments() {
  // Combine diff comments and document comments
  let output = '';
  const diffOutput = formatDiffComments();
  if (diffOutput && diffOutput !== 'No comments (LGTM).') output += diffOutput;

  // Document comments (prefixed with doc:<id>: in the comments map)
  for (const item of sessionItems) {
    if (item.id === 'diff') continue;
    const docComments = Object.entries(comments).filter(([k]) => k.startsWith(`doc:${item.id}:`));
    if (docComments.length === 0) continue;
    output += `## ${item.title}\n\n`;
    const sorted = docComments.sort((a, b) => {
      const ai = parseInt(a[0].split(':').pop());
      const bi = parseInt(b[0].split(':').pop());
      return ai - bi;
    });
    for (const [key, text] of sorted) {
      const blockIdx = parseInt(key.split(':').pop());
      const blockEl = document.getElementById(`md-block-${item.id}-${blockIdx}`);
      const preview = blockEl?.textContent?.trim()?.slice(0, 80) || `Block ${blockIdx}`;
      output += `**${preview}${preview.length >= 80 ? '...' : ''}**\n`;
      output += `> ${text}\n\n`;
    }
  }
  return output || 'No comments (LGTM).';
}

function formatMarkdownComments() {
  let output = `## ${mdMeta.filepath || mdMeta.filename}\n\n`;
  const entries = Object.entries(comments).sort((a, b) => {
    return parseInt(a[0].split('::')[1]) - parseInt(b[0].split('::')[1]);
  });
  for (const [key, text] of entries) {
    const blockIdx = parseInt(key.split('::')[1]);
    const blockEl = document.getElementById('md-block-' + blockIdx);
    const preview = blockEl?.textContent?.trim()?.slice(0, 80) || `Block ${blockIdx}`;
    output += `**${preview}${preview.length >= 80 ? '...' : ''}**\n`;
    output += `> ${text}\n\n`;
  }
  return output || 'No comments (LGTM).';
}

// --- Markdown mode ---
function mdKey(blockIdx) {
  return activeItemId === 'diff' ? `md::${blockIdx}` : `doc:${activeItemId}:${blockIdx}`;
}

function mdBlockId(blockIdx) {
  return `md-block-${activeItemId}-${blockIdx}`;
}

function mdCommentId(blockIdx) {
  return `md-comment-${activeItemId}-${blockIdx}`;
}

function renderMarkdown(data) {
  mdMeta = data;
  const container = document.getElementById('diff-container');

  marked.setOptions({
    highlight: (code, lang) => {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang, ignoreIllegals: true }).value;
      }
      return hljs.highlightAuto(code).value;
    },
    gfm: true,
    breaks: false,
  });

  const rawHtml = marked.parse(data.content);
  const temp = document.createElement('div');
  temp.innerHTML = rawHtml;

  let html = '';
  let blockIdx = 0;
  for (const child of temp.children) {
    const key = mdKey(blockIdx);
    const hasComment = !!comments[key];

    // Check for Claude comments on this block
    const claudeForBlock = claudeComments.filter(c => c.block === blockIdx);
    let claudeHtml = '';
    for (const cc of claudeForBlock) {
      claudeHtml += `<div class="md-comment" style="margin:4px 0">
        <div class="comment-box" style="max-width:100%">
          <div class="claude-comment">
            <span class="claude-label">Claude</span>
            ${escapeHtml(cc.comment)}
          </div>
        </div>
      </div>`;
    }

    html += `<div class="md-block ${hasComment ? 'has-comment' : ''}" id="${mdBlockId(blockIdx)}" data-block="${blockIdx}" onclick="toggleMdComment(${blockIdx})">${child.outerHTML}</div>`;
    html += claudeHtml;
    if (hasComment) {
      html += `<div class="md-comment" id="${mdCommentId(blockIdx)}">
        <div class="comment-box">
          <div class="saved-comment" onclick="event.stopPropagation(); editMdComment(${blockIdx})">
            ${escapeHtml(comments[key])}
            <span class="edit-hint">click to edit</span>
          </div>
        </div>
      </div>`;
    }
    blockIdx++;
  }

  container.innerHTML = `<div class="md-content">${html}</div>`;
  updateMdStats();
}

function renderMarkdownComments() {
  document.querySelectorAll('.md-block').forEach(el => {
    const idx = parseInt(el.dataset.block);
    const key = mdKey(idx);
    el.classList.toggle('has-comment', !!comments[key]);
    const existing = document.getElementById(mdCommentId(idx));
    if (existing) existing.remove();
    if (comments[key]) {
      const div = document.createElement('div');
      div.className = 'md-comment';
      div.id = mdCommentId(idx);
      div.innerHTML = `
        <div class="comment-box">
          <div class="saved-comment" onclick="event.stopPropagation(); editMdComment(${idx})">
            ${escapeHtml(comments[key])}
            <span class="edit-hint">click to edit</span>
          </div>
        </div>
      `;
      el.after(div);
    }
  });
  updateMdStats();
}

function updateMdStats(blockCount) {
  const count = Object.keys(comments).length;
  document.getElementById('stats').innerHTML =
    `${mdMeta.filename || 'Document'}` +
    (count > 0 ? ` &middot; ${count} comment${count !== 1 ? 's' : ''}` : '');
}

function toggleMdComment(blockIdx) {
  const key = mdKey(blockIdx);
  if (comments[key]) { editMdComment(blockIdx); return; }

  const existing = document.getElementById(mdCommentId(blockIdx));
  if (existing) { existing.querySelector('textarea')?.focus(); return; }

  const block = document.getElementById(mdBlockId(blockIdx));
  if (!block) return;

  const div = document.createElement('div');
  div.className = 'md-comment';
  div.id = mdCommentId(blockIdx);
  div.innerHTML = `
    <div class="comment-box">
      <textarea placeholder="Leave a comment..." autofocus onclick="event.stopPropagation()"></textarea>
      <div class="comment-actions">
        <button class="cancel-btn" data-action="cancel">Cancel</button>
        <button class="save-btn" data-action="save">Save</button>
      </div>
    </div>
  `;

  const textarea = div.querySelector('textarea');
  textarea.addEventListener('keydown', (e) => {
    e.stopPropagation();
    if (e.key === 'Escape') { div.remove(); e.preventDefault(); }
    else if (e.key === 'Enter' && e.metaKey) { saveMdComment(blockIdx); e.preventDefault(); }
  });
  div.querySelector('[data-action="cancel"]').addEventListener('click', (e) => { e.stopPropagation(); div.remove(); });
  div.querySelector('[data-action="save"]').addEventListener('click', (e) => { e.stopPropagation(); saveMdComment(blockIdx); });

  block.after(div);
  textarea.focus();
}

function editMdComment(blockIdx) {
  const key = mdKey(blockIdx);
  let div = document.getElementById(mdCommentId(blockIdx));
  if (!div) return;

  div.innerHTML = `
    <div class="comment-box">
      <textarea onclick="event.stopPropagation()">${escapeHtml(comments[key])}</textarea>
      <div class="comment-actions">
        <button class="cancel-btn" data-action="cancel-edit">Cancel</button>
        <button class="cancel-btn" data-action="delete" style="color: var(--del-text)">Delete</button>
        <button class="save-btn" data-action="save">Save</button>
      </div>
    </div>
  `;

  const textarea = div.querySelector('textarea');
  textarea.addEventListener('keydown', (e) => {
    e.stopPropagation();
    if (e.key === 'Escape') { renderMarkdownComments(); e.preventDefault(); }
    else if (e.key === 'Enter' && e.metaKey) { saveMdComment(blockIdx); e.preventDefault(); }
  });
  div.querySelector('[data-action="cancel-edit"]').addEventListener('click', (e) => { e.stopPropagation(); renderMarkdownComments(); });
  div.querySelector('[data-action="delete"]').addEventListener('click', (e) => { e.stopPropagation(); delete comments[key]; renderMarkdownComments(); });
  div.querySelector('[data-action="save"]').addEventListener('click', (e) => { e.stopPropagation(); saveMdComment(blockIdx); });

  textarea.focus();
  textarea.setSelectionRange(textarea.value.length, textarea.value.length);
}

function saveMdComment(blockIdx) {
  const key = mdKey(blockIdx);
  const div = document.getElementById(mdCommentId(blockIdx));
  if (!div) return;
  const text = div.querySelector('textarea')?.value?.trim();
  if (!text) { delete comments[key]; }
  else { comments[key] = text; }
  renderMarkdownComments();
}

// --- Commit picker ---
let allCommits = [];
let selectedShas = new Set();

async function loadCommits() {
  try {
    const resp = await fetch('/commits');
    const data = await resp.json();
    allCommits = data.commits || [];
    if (allCommits.length === 0) return;

    // Show toggle, select all by default
    document.getElementById('commit-toggle-wrap').style.display = '';
    allCommits.forEach(c => selectedShas.add(c.sha));
    updateCommitToggle();
    renderCommitPanel();
  } catch {}
}

function updateCommitToggle() {
  const btn = document.getElementById('commit-toggle-btn');
  const total = allCommits.length;
  const selected = selectedShas.size;
  const label = selected === total ? `Commits (${total})` : `Commits (${selected}/${total})`;
  btn.innerHTML = label;
}

function toggleCommitPanel() {
  document.getElementById('commit-panel').classList.toggle('open');
}

function renderCommitPanel() {
  const panel = document.getElementById('commit-panel');
  let html = `<div class="commit-actions">
    <a onclick="selectAllCommits()">Select all</a>
    <a onclick="selectNoneCommits()">Select none</a>
    <a onclick="applyCommitSelection()">Apply</a>
  </div>`;
  html += '<div class="commit-list">';
  for (const c of allCommits) {
    const checked = selectedShas.has(c.sha) ? 'checked' : '';
    html += `<label class="commit-item">
      <input type="checkbox" ${checked} data-sha="${c.sha}" onchange="onCommitToggle(this)">
      <span class="commit-sha">${c.sha.slice(0, 7)}</span>
      <span class="commit-msg" title="${escapeHtml(c.message)}">${escapeHtml(c.message)}</span>
      <span class="commit-date">${escapeHtml(c.date)}</span>
    </label>`;
  }
  html += '</div>';
  panel.innerHTML = html;
}

function onCommitToggle(el) {
  const sha = el.dataset.sha;
  if (el.checked) selectedShas.add(sha);
  else selectedShas.delete(sha);
  updateCommitToggle();
}

function selectAllCommits() {
  allCommits.forEach(c => selectedShas.add(c.sha));
  renderCommitPanel();
  updateCommitToggle();
}

function selectNoneCommits() {
  selectedShas.clear();
  renderCommitPanel();
  updateCommitToggle();
}

async function applyCommitSelection() {
  document.getElementById('commit-panel').classList.remove('open');

  // Fetch diff for selected commits
  let url = '/data';
  if (selectedShas.size > 0 && selectedShas.size < allCommits.length) {
    url += '?commits=' + Array.from(selectedShas).join(',');
  }

  try {
    const resp = await fetch(url);
    const data = await resp.json();
    files = parseDiff(data.diff);
    lineIdCounter = 0;
    for (const key of Object.keys(lineKeyToId)) delete lineKeyToId[key];
    if (activeFileIdx >= files.length) activeFileIdx = 0;
    renderFileList();
    if (files.length > 0) renderDiff(activeFileIdx);
    else document.getElementById('diff-container').innerHTML = '<div class="empty-state">No changes for selected commits</div>';
    showToast(`Showing ${selectedShas.size} commit${selectedShas.size !== 1 ? 's' : ''}`);
  } catch (e) {
    showToast('Failed to apply: ' + e.message);
  }
}

// --- Tabs / Items ---
async function loadItems() {
  try {
    const resp = await fetch('/items');
    const data = await resp.json();
    sessionItems = data.items || [];
    renderTabs();
  } catch {}
}

function renderTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  for (const item of sessionItems) {
    const tab = document.createElement('div');
    tab.className = 'tab-item' + (item.id === activeItemId ? ' active' : '');
    tab.dataset.id = item.id;

    let badges = '';
    const userCount = Object.keys(comments).filter(k => k.startsWith(item.id === 'diff' ? '' : `doc:${item.id}:`)).length;
    // For diff, count all non-doc comments
    const effUserCount = item.id === 'diff'
      ? Object.keys(comments).filter(k => !k.startsWith('doc:')).length
      : Object.keys(comments).filter(k => k.startsWith(`doc:${item.id}:`)).length;
    const claudeCount = (claudeComments.filter(c => c._item === item.id) || []).length;

    if (claudeCount > 0) badges += `<span class="tab-badge claude">${claudeCount}</span>`;
    if (effUserCount > 0) badges += `<span class="tab-badge user">${effUserCount}</span>`;

    tab.innerHTML = `${escapeHtml(item.title)}${badges}`;
    tab.onclick = () => switchToItem(item.id);
    bar.appendChild(tab);
  }
}

async function switchToItem(itemId) {
  activeItemId = itemId;
  renderTabs();

  const data = await (await fetch(`/data?item=${encodeURIComponent(itemId)}`)).json();

  if (data.mode === 'diff') {
    // Show diff UI
    document.querySelector('.sidebar').style.display = '';
    document.getElementById('resize-handle').style.display = '';
    document.querySelector('.keyboard-hint').innerHTML = 'Click line to comment &middot; <kbd>Cmd+Enter</kbd> save &middot; <kbd>f</kbd> search &middot; <kbd>e</kbd> reviewed &middot; <kbd>c</kbd> commits &middot; <kbd>n</kbd>/<kbd>p</kbd> next/prev comment';

    repoMeta = data.meta || {};
    claudeComments = (data.claudeComments || []).map(c => ({...c, _item: 'diff'}));
    appMode = 'diff';

    if (data.description) {
      const banner = document.getElementById('description-banner');
      banner.textContent = data.description;
      banner.style.display = '';
    } else {
      document.getElementById('description-banner').style.display = 'none';
    }

    // Meta bar
    if (repoMeta.branch) {
      const bar = document.getElementById('meta-bar');
      let metaHtml = `<span class="branch">${escapeHtml(repoMeta.branch)}</span>`;
      metaHtml += `<span>vs ${escapeHtml(repoMeta.baseBranch || 'master')}</span>`;
      if (repoMeta.repoPath) metaHtml += `<span>${escapeHtml(repoMeta.repoPath)}</span>`;
      if (repoMeta.pr) {
        metaHtml += `<a class="pr-link" href="${escapeHtml(repoMeta.pr.url)}" target="_blank">PR #${repoMeta.pr.number}: ${escapeHtml(repoMeta.pr.title)}</a>`;
      }
      bar.innerHTML = metaHtml;
      bar.style.display = '';
    }

    files = parseDiff(data.diff);
    renderFileList();
    if (files.length > 0) selectFile(0);
    else document.getElementById('diff-container').innerHTML = '<div class="empty-state">No changes to review</div>';
    loadCommits();

  } else if (data.mode === 'file') {
    // Show document UI
    document.querySelector('.sidebar').style.display = 'none';
    document.getElementById('resize-handle').style.display = 'none';
    document.getElementById('meta-bar').style.display = 'none';
    document.getElementById('description-banner').style.display = 'none';
    document.querySelector('.keyboard-hint').innerHTML = 'Click any block to comment &middot; <kbd>Cmd+Enter</kbd> save &middot; <kbd>Esc</kbd> cancel';

    claudeComments = (data.claudeComments || []).map(c => ({...c, _item: activeItemId}));
    appMode = 'file';
    renderMarkdown(data);
  }
}

// --- Init ---
(async function init() {
  try {
    await loadItems();

    // Set page title from first load
    const data = await fetchData();
    repoMeta = data.meta || {};
    const branch = repoMeta.branch || 'Review';
    document.title = `Review: ${branch}`;
    document.querySelector('h1').textContent = `Review: ${branch}`;

    // Load the default item (diff)
    await switchToItem('diff');
  } catch (e) {
    document.getElementById('diff-container').innerHTML = `<div class="empty-state">Error: ${escapeHtml(e.message)}</div>`;
  }
})();

// --- File search handler ---
document.getElementById('file-search').addEventListener('input', (e) => filterFiles(e.target.value));

// --- Keyboard shortcuts ---
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'j' || e.key === 'ArrowDown') {
    const next = activeFileIdx + 1;
    if (next < files.length) selectFile(next);
  } else if (e.key === 'k' || e.key === 'ArrowUp') {
    const prev = activeFileIdx - 1;
    if (prev >= 0) selectFile(prev);
  } else if (e.key === 'r' && !e.metaKey && !e.ctrlKey) {
    refreshDiff();
  } else if (e.key === 'f' && !e.metaKey && !e.ctrlKey) {
    e.preventDefault();
    document.getElementById('file-search').focus();
  } else if (e.key === 'c' && !e.metaKey && !e.ctrlKey) {
    if (allCommits.length > 0) toggleCommitPanel();
  } else if (e.key === 'e' && !e.metaKey && !e.ctrlKey) {
    if (files[activeFileIdx]) toggleReviewed(files[activeFileIdx].path);
  } else if (e.key === 'n' && !e.metaKey && !e.ctrlKey) {
    jumpToComment('next');
  } else if (e.key === 'p' && !e.metaKey && !e.ctrlKey) {
    jumpToComment('prev');
  }
});

// --- Resizable sidebar ---
(() => {
  const handle = document.getElementById('resize-handle');
  const sidebar = document.querySelector('.sidebar');
  let dragging = false;

  handle.addEventListener('mousedown', (e) => {
    dragging = true;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const newWidth = Math.min(Math.max(e.clientX, 150), 600);
    sidebar.style.width = newWidth + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// Escape from search back to diff
document.getElementById('file-search').addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    e.target.value = '';
    filterFiles('');
    e.target.blur();
  } else if (e.key === 'Enter') {
    // Select first visible file
    const first = document.querySelector('.file-item:not(.hidden)');
    if (first) selectFile(parseInt(first.dataset.idx));
    e.target.blur();
  }
});
